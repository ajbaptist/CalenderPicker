name: calender_picker

description: A modern, customizable Flutter calendar picker with horizontal timeline, single/multi-date selection, date ranges, and extensive customization options.

version: 3.0.2

homepage: https://github.com/ajbaptist/CalenderPicker
repository: https://github.com/ajbaptist/CalenderPicker
issue_tracker: https://github.com/ajbaptist/CalenderPicker/issues
documentation: https://github.com/ajbaptist/CalenderPicker#readme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

topics:
  - calendar
  - date-picker
  - timeline
  - flutter
  - widget

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

screenshots:
  - description: Calendar picker with single date selection
    path: screenshots/single_date_selection.jpg

  - description: Calendar picker with multiple date selection
    path: screenshots/multiple_date_selection.jpg

  - description: Calendar picker with date range selection
    path: screenshots/range_date_selection.jpg

  - description: Calendar picker with custom styling
    path: screenshots/custom_date_selection.jpg

flutter:
  uses-material-design: true
