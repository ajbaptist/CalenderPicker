name: calender_picker
description: A modern, customizable Flutter calendar picker with horizontal timeline, single/multi-date selection, date ranges, and extensive customization options.
version: 3.0.0
homepage: https://github.com/baptistjo01/CalenderPicker.git
repository: https://github.com/baptistjo01/CalenderPicker.git
issue_tracker: https://github.com/baptistjo01/CalenderPicker/issues
documentation: https://github.com/baptistjo01/CalenderPicker#readme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

topics:
  - calendar
  - date-picker
  - timeline
  - flutter
  - widget

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

screenshots:
  - description: CalendarPicker demo with single selection
    path: screenshots/single_selection.png
  - description: CalendarPicker demo with multi selection
    path: screenshots/multi_selection.png
  - description: CalendarPicker demo with date range selection
    path: screenshots/date_range.png
  - description: CalendarPicker demo with dark mode
    path: screenshots/dark_mode.png

flutter:
  # Enable Material icons for the example app and package demos.
  uses-material-design: true
  # No custom package assets are required for the calendar picker.
  # If you add package-specific assets, list them here.
  # assets:
  #   - assets/
